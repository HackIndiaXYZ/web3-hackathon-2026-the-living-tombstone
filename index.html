    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SUPABASE CONFIGURATION ---
        const supabaseUrl = 'https://rjnolzmhitlcawtsgvwk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqbm9sem1oaXRsY2F3dHNndndrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMDcxNDEsImV4cCI6MjA5Mjc4MzE0MX0.TMatVjTaxuPRCxUDdfmXJ2xSaxNY32rzNZa91ghKGfI';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        const CustomCursor = () => {
            const dot = useRef(null);
            const circle = useRef(null);
            const pos = useRef({ x: 0, y: 0 });
            const targetPos = useRef({ x: 0, y: 0 });

            useEffect(() => {
                const move = (e) => {
                    targetPos.current.x = e.clientX;
                    targetPos.current.y = e.clientY;
                    if(dot.current) {
                        dot.current.style.left = `${e.clientX}px`;
                        dot.current.style.top = `${e.clientY}px`;
                    }
                };

                const addHover = () => document.body.classList.add('cursor-hover');
                const removeHover = () => document.body.classList.remove('cursor-hover');

                window.addEventListener('mousemove', move);
                
                const attachInteractive = () => {
                    document.querySelectorAll('button, a, input, .hover-3d-effect, .interactive, .tab-btn').forEach(el => {
                        el.addEventListener('mouseenter', addHover);
                        el.addEventListener('mouseleave', removeHover);
                    });
                };
                attachInteractive();

                const render = () => {
                    pos.current.x += (targetPos.current.x - pos.current.x) * 0.15;
                    pos.current.y += (targetPos.current.y - pos.current.y) * 0.15;
                    if (circle.current) {
                        circle.current.style.left = `${pos.current.x}px`;
                        circle.current.style.top = `${pos.current.y}px`;
                    }
                    requestAnimationFrame(render);
                };
                render();

                const observer = new MutationObserver(() => attachInteractive());
                observer.observe(document.body, { childList: true, subtree: true });

                return () => {
                    window.removeEventListener('mousemove', move);
                    observer.disconnect();
                };
            }, []);
            return (
                <>
                    <div ref={dot} id="custom-cursor" />
                    <div ref={circle} className="cursor-outer" />
                </>
            );
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: containerRef.current, attrs: { width: size, height: size, class: className } });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        const InfoTooltip = ({ text }) => (
            <div className="tooltip inline-block ml-3 cursor-help relative z-[999]">
                <Icon name="info" size={16} className="opacity-60 hover:text-neon hover:opacity-100 transition-colors duration-300 drop-shadow-[0_0_5px_rgba(208,0,255,0.5)]" />
                <span className="tooltip-text">{text}</span>
            </div>
        );

        const App = () => {
            // --- AUTHENTICATION STATE ---
            const [isAuthOpen, setIsAuthOpen] = useState(false);
            const [authMode, setAuthMode] = useState('login'); 
            const [currentUser, setCurrentUser] = useState(null);
            const [authData, setAuthData] = useState({ name: '', email: '', password: '' });

            // --- VAULT STATES ---
            const [registry, setRegistry] = useState([]);
            const [activeHash, setActiveHash] = useState(null);
            const [activeFile, setActiveFile] = useState(null);
            const [fileBuffer, setFileBuffer] = useState(null);
            const [isScanning, setIsScanning] = useState(false);
            const [verificationStatus, setVerificationStatus] = useState(null);

            // States for CORE modules
            const [quantumScore, setQuantumScore] = useState(0);
            const [entropyScore, setEntropyScore] = useState(0);
            const [bioLinked, setBioLinked] = useState(false);
            const [geoCoords, setGeoCoords] = useState(null);
            const [watermarkActive, setWatermarkActive] = useState(false);
            const [selfDestructTimer, setSelfDestructTimer] = useState(null);
            const [sharded, setSharded] = useState(false);
            const [secretMessage, setSecretMessage] = useState("");
            const [currentTime, setCurrentTime] = useState(new Date());
            const [hexDump, setHexDump] = useState("");
            const [ipfsHash, setIpfsHash] = useState("");
            
            const canvasRef = useRef(null);

            // --- NEW: ADVANCED MODULE STATES ---
            const [activeTab, setActiveTab] = useState('core'); // 'core' | 'advanced'
            const [voiceLinked, setVoiceLinked] = useState(false);
            const [isSonifying, setIsSonifying] = useState(false);
            const [glitchActive, setGlitchActive] = useState(false);
            const [isFlashing, setIsFlashing] = useState(false);
            const [keystrokeData, setKeystrokeData] = useState("");
            const [keystrokeVerified, setKeystrokeVerified] = useState(false);
            const [parityGenerated, setParityGenerated] = useState(false);
            const [chronoLockTime, setChronoLockTime] = useState("");
            const [chronoLocked, setChronoLocked] = useState(false);
            const [arActive, setArActive] = useState(false);
            const [gyroSeed, setGyroSeed] = useState(0);
            
            const arVideoRef = useRef(null);
            const topoCanvasRef = useRef(null);

            // Setup Scroll Reveal Observer
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                        }
                    });
                }, { threshold: 0.1 });
                
                const observeElements = () => {
                    document.querySelectorAll('.reveal-up, .reveal-left, .reveal-right, .reveal-scale, .reveal-rotate').forEach(el => observer.observe(el));
                };

                // Small delay to let React render the DOM elements first
                const timeout = setTimeout(observeElements, 100);

                return () => {
                    clearTimeout(timeout);
                    observer.disconnect();
                };
            }, [activeTab, activeHash]);

            // Setup 3D Hover Effects for Modules
            useEffect(() => {
                const apply3DEffect = () => {
                    const cards = document.querySelectorAll('.hover-3d-effect');
                    cards.forEach(card => {
                        card.addEventListener('mousemove', (e) => {
                            const rect = card.getBoundingClientRect();
                            const x = e.clientX - rect.left;
                            const y = e.clientY - rect.top;
                            const rotateX = ((y - rect.height/2) / rect.height) * -25;
                            const rotateY = ((x - rect.width/2) / rect.width) * 25;
                            
                            card.style.setProperty('--mouse-x', `${x}px`);
                            card.style.setProperty('--mouse-y', `${y}px`);
                            
                            if(!card.disabled && !card.classList.contains('opacity-50')) {
                                card.style.transform = `perspective(1200px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(20px)`;
                            }
                        });
                        card.addEventListener('mouseleave', () => {
                            card.style.transform = `perspective(1200px) rotateX(0deg) rotateY(0deg) translateZ(0)`;
                        });
                    });
                };
                
                const timer = setTimeout(apply3DEffect, 150);
                return () => clearTimeout(timer);
            }, [activeTab, activeHash]);

            useEffect(() => {
                const fetchLedger = async () => {
                    const { data, error } = await supabaseClient
                        .from('registry') 
                        .select('*')
                        .order('created_at', { ascending: false }); 
                    
                    if (error) {
                        console.error('Error fetching ledger:', error);
                    } else if (data) {
                        setRegistry(data);
                    }
                };
                fetchLedger();

                const subscription = supabaseClient
                    .channel('public:registry')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'registry' }, payload => {
                        setRegistry(current => [payload.new, ...current]);
                    })
                    .subscribe();

                return () => supabaseClient.removeChannel(subscription);
            }, []);

            useEffect(() => {
                const checkSession = async () => {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (session) {
                        setCurrentUser({
                            name: session.user.user_metadata?.name || 'Verified Node',
                            email: session.user.email,
                            token: session.access_token
                        });
                    }
                };
                checkSession();
            }, []);

            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentTime(new Date());
                    const now = Date.now();
                    
                    if (activeHash && selfDestructTimer && activeHash.destructAt && activeHash.destructAt <= now) {
                        setActiveHash(null);
                        setActiveFile(null);
                        setFileBuffer(null);
                        setVerificationStatus(null);
                    }

                    setRegistry(prevRegistry => {
                        const updated = prevRegistry.filter(item => !item.metadata?.destructAt || item.metadata.destructAt > now);
                        return updated.length !== prevRegistry.length ? updated : prevRegistry;
                    });
                }, 1000);
                return () => clearInterval(timer);

                                <button disabled={!activeHash} onClick={generateDecoy} className={`hover-3d-effect liquid-glass p-8 rounded-[32px] border text-left flex flex-col justify-between min-h-[220px] border-white/20 ${!activeHash ? 'opacity-50' : ''}`}>
                                    <div className="flex justify-between items-start mb-6 w-full relative z-10">
                                        <div className="flex items-center">
                                            <Icon name="copy" size={24} className="opacity-100 mr-3 text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.6)]" />
                                            <span className="font-mono text-sm uppercase opacity-90 tracking-wider">Decoy Maker</span>
                                            <InfoTooltip text="Generates a fake file filled with random cryptographic noise that perfectly matches the exact byte size of your original file." />
                                        </div>
                                    </div>
                                    <div className="font-grotesk text-3xl uppercase tracking-wide text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] relative z-10">Generate Dummy</div>
                                </button>

                                {/* 11. Self-Destruct */}
                                <div className={`hover-3d-effect liquid-glass p-8 rounded-[32px] border flex flex-col justify-between lg:col-span-2 min-h-[220px] ${selfDestructTimer ? 'border-red-500/80 shadow-[0_0_50px_rgba(239,68,68,0.5)] bg-red-500/10' : 'border-white/20'} ${!activeHash ? 'opacity-50' : ''}`}>
                                    <div className="flex items-center mb-6 relative z-10">
                                        <Icon name="timer" size={24} className={selfDestructTimer ? 'text-red-500 mr-3 animate-pulse drop-shadow-[0_0_10px_#ef4444]' : 'opacity-90 mr-3 text-white'} />
                                        <span className="font-mono text-sm uppercase opacity-90 tracking-wider">Memory Wipe Sequence</span>
                                        <InfoTooltip text="When the timer expires, the file buffer is permanently deleted from browser memory and wiped from the registry." />
                                    </div>
                                    <div className="flex gap-4 relative z-10">
                                        {[1, 3, 5, 10].map(mins => (
                                            <button 
                                                key={mins} disabled={!activeHash}
                                                onClick={() => setSelfDestructTimer(selfDestructTimer === mins ? null : mins)}
                                                className={`flex-1 py-4 font-mono text-sm font-bold tracking-widest rounded-2xl transition-all duration-300 ${selfDestructTimer === mins ? 'bg-red-500 text-white shadow-[0_0_30px_rgba(239,68,68,0.6)] transform scale-105 border border-red-400' : 'bg-black/40 border border-white/10 hover:bg-white/10 hover:border-white/40 hover:scale-105'}`}
                                            >
                                                {mins} MIN
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* 12. IPFS CID / Multihash */}
                                <div className={`hover-3d-effect liquid-glass p-8 rounded-[32px] border border-white/20 lg:col-span-3 min-h-[180px] flex flex-col justify-center ${!activeHash ? 'opacity-50' : ''}`}>
                                    <div className="flex items-center mb-6 relative z-10">
                                        <Icon name="globe" size={24} className="text-neon opacity-100 mr-3 drop-shadow-[0_0_10px_#D000FF]" />
                                        <span className="font-mono text-sm uppercase opacity-90 tracking-wider">IPFS CIDv1 Multihash Generation</span>
                                        <InfoTooltip text="Computes the Content Identifier (CID) that would be used if this file were uploaded to the decentralized InterPlanetary File System (IPFS)." />
                                    </div>
                                    <div className="font-mono text-sm bg-black/60 p-5 rounded-2xl truncate border border-white/10 opacity-100 text-neon tracking-widest shadow-inner selection:bg-neon selection:text-white drop-shadow-[0_0_15px_rgba(208,0,255,0.3)] relative z-10">
                                        {ipfsHash || "AWAITING CIPHER GENERATION..."}
                                    </div>
                                </div>
                            </div>
                            )}

                            {/* ADVANCED MODULES RENDERING */}
                            {activeTab === 'advanced' && (
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8 animate-in fade-in slide-in-from-bottom-12 duration-700 reveal-rotate">
                                
                                {/* F1: Voice Biometric Seal */}
                                <button disabled={!activeHash} onClick={triggerVoiceSeal} className={`hover-3d-effect liquid-glass p-8 rounded-[32px] border text-left flex flex-col justify-between min-h-[220px] relative ${voiceLinked ? 'border-neon bg-neon/10 shadow-[0_0_60px_rgba(208,0,255,0.5)]' : 'border-white/20'} ${!activeHash ? 'opacity-50' : ''}`}>
                                    {voiceLinked && (
                                        <div className="absolute inset-0 pointer-events-none z-0 rounded-[32px] overflow-hidden">
                                            <div className="holo-scan" />
                                        </div>
                                    )}
                                    <div className="flex justify-between items-start mb-6 w-full relative z-10">
                                        <div className="flex items-center">
                                            <Icon name="mic" size={24} className={voiceLinked ? 'text-neon mr-3 animate-pulse drop-shadow-[0_0_10px_#D000FF]' : 'opacity-90 mr-3 text-white'} />
                                            <span className="font-mono text-sm uppercase opacity-90 tracking-wider">Voice Signature</span>
                                            <InfoTooltip text="Uses Web Audio API to record a 3-second voice print and hashes it directly into the document seal." />
                                        </div>
                                    </div>
                                    <div className="font-grotesk text-3xl uppercase tracking-wide text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] relative z-10">{voiceLinked ? 'Vocal Bond Active' : 'Record Audio Seal'}</div>
                                </button>

                                {/* F2: File Sonification */}
                                <button disabled={!activeHash} onClick={toggleSonification} className={`hover-3d-effect liquid-glass p-8 rounded-[32px] border text-left flex flex-col justify-between min-h-[220px] relative ${isSonifying ? 'border-blue-500 shadow-[0_0_60px_rgba(59,130,246,0.5)] bg-blue-500/10' : 'border-white/20'} ${!activeHash ? 'opacity-50' : ''}`}>
                                    <div className="flex justify-between items-start mb-6 w-full relative z-10">
                                        <div className="flex items-center">
                                            <Icon name="radio" size={24} className={isSonifying ? 'text-blue-500 mr-3 drop-shadow-[0_0_10px_#3b82f6]' : 'opacity-90 mr-3 text-white'} />
                                            <span className="font-mono text-sm uppercase opacity-90 tracking-wider">Data Sonification</span>
                                            <InfoTooltip text="Translates the raw binary buffer of the file into real-time audio frequencies using an oscillating synthesizer." />
                                        </div>
                                    </div>
                                    {isSonifying ? (
                                        <div className="waveform relative z-10 scale-150 transform origin-left">
                                            {[...Array(10)].map((_, i) => <div key={i} className="waveform-bar !bg-blue-500 !shadow-[0_0_15px_#3b82f6]" style={{ animationDelay: `${i * 0.1}s` }}></div>)}
                                        </div>
                                    ) : (
                                        <div className="font-grotesk text-3xl uppercase tracking-wide text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] relative z-10">Play Byte Stream</div>
                                    )}
                                </button>

                                {/* F3: 3D Topography Grid */}
                                <div className={`hover-3d-effect liquid-glass p-8 rounded-[32px] border flex flex-col justify-between min-h-[220px] relative ${!activeHash ? 'border-white/10 opacity-50' : 'border-neon/80 shadow-[0_0_40px_rgba(208,0,255,0.4)]'}`}>
                                    <div className="absolute inset-0 z-0 overflow-hidden rounded-[32px] pointer-events-none">
                                        <canvas ref={topoCanvasRef} width="400" height="200" className="absolute bottom-0 left-0 w-full h-[160px] opacity-90" style={{ transform: 'perspective(600px) rotateX(50deg) scale(1.3) translateY(10px)' }}></canvas>
                                    </div>
                                    <div className="flex justify-between items-start mb-4 relative z-10">
                                        <div className="flex items-center">
                                            <Icon name="box" size={24} className="text-neon opacity-100 mr-3 drop-shadow-[0_0_10px_#D000FF]" />
                                            <span className="font-mono text-sm uppercase opacity-90 tracking-wider">3D Byte Topology</span>
                                            <InfoTooltip text="A live 3D visual mapping representing the cryptographic depth and byte distribution of your file." />
                                        </div>
                                    </div>
                                </div>

                                {/* F4: Glitch Obfuscation */}
                                <button disabled={!activeHash} onClick={triggerGlitch} className={`hover-3d-effect liquid-glass p-8 rounded-[32px] border text-left flex flex-col justify-between min-h-[220px] relative ${glitchActive ? 'border-yellow-400 bg-yellow-400/10 shadow-[0_0_50px_rgba(250,204,21,0.4)]' : 'border-white/20'} ${!activeHash ? 'opacity-50' : ''}`}>
                                    <div className="flex justify-between items-start mb-6 w-full relative z-10">
                                        <div className="flex items-center">
                                            <Icon name="zap" size={24} className={glitchActive ? 'text-yellow-400 mr-3 drop-shadow-[0_0_10px_#facc15]' : 'opacity-90 mr-3 text-white'} />
                                            <span className="font-mono text-sm uppercase opacity-90 tracking-wider">Glitch Obfuscation</span>
                                            <InfoTooltip text="Deterministically slices and offsets image byte data to visually scramble the asset prior to encryption." />
                                        </div>
                                    </div>
                                    <div className={`font-grotesk text-3xl uppercase tracking-wide text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] relative z-10 ${glitchActive ? 'glitch-text text-yellow-400' : ''}`}>{glitchActive ? 'File Corrupted' : 'Inject Glitch'}</div>
                                </button>

                                {/* F5: Optical Li-Fi Transfer */}
                                <button disabled={!activeHash} onClick={triggerOptical} className={`hover-3d-effect liquid-glass p-8 rounded-[32px] border text-left flex flex-col justify-between min-h-[220px] border-white/20 relative ${!activeHash ? 'opacity-50' : ''}`}>
                                    <div className="flex justify-between items-start mb-6 w-full relative z-10">
                                        <div className="flex items-center">
                                            <Icon name="sun" size={24} className="opacity-100 mr-3 text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]" />
                                            <span className="font-mono text-sm uppercase opacity-90 tracking-wider">Optical Transmission</span>
                                            <InfoTooltip text="Flashes the screen at extreme frequencies to optically transmit the hash to a specialized camera receiver (Li-Fi sim)." />
                                        </div>
                                    </div>
                                    <div className="font-grotesk text-3xl uppercase tracking-wide text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] relative z-10">Trigger Light Burst</div>
                                </button>

                                {/* F6: Keystroke Dynamics */}
                                <div className={`hover-3d-effect liquid-glass p-8 rounded-[32px] border flex flex-col justify-between min-h-[220px] relative ${keystrokeVerified ? 'border-green-400 bg-green-400/10 shadow-[0_0_50px_rgba(74,222,128,0.4)]' : 'border-white/20'} ${!activeHash ? 'opacity-50' : ''}`}>
                                    <div className="flex justify-between items-start mb-4 relative z-10">
                                        <div className="flex items-center">
                                            <Icon name="keyboard" size={24} className={keystrokeVerified ? 'text-green-400 mr-3 drop-shadow-[0_0_10px_#4ade80]' : 'opacity-90 mr-3 text-white'} />
                                            <span className="font-mono text-sm uppercase opacity-90 tracking-wider">Rhythm Lock</span>
                                            <InfoTooltip text="Calculates flight and dwell time of your typing. You must type a passphrase with the exact same rhythm to unlock." />
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-3 relative z-10">
                                        <input type="password" value={keystrokeData} onChange={handleKeystrokeChange} disabled={!activeHash} placeholder={keystrokeVerified ? "Verify rhythm..." : "Type rhythm sequence..."} className="w-full bg-black/60 border border-white/20 rounded-xl px-5 py-4 font-mono text-sm outline-none focus:border-neon focus:shadow-[0_0_20px_rgba(208,0,255,0.5)] transition-all text-white shadow-inner" />
                                        <div className="font-grotesk text-2xl uppercase tracking-wide text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">{keystrokeVerified ? 'Awaiting Verification' : 'Awaiting Input'}</div>
                                    </div>
                                </div>

                                {/* F7: Redundancy Parity */}
                                <button disabled={!activeHash} onClick={generateParity} className={`hover-3d-effect liquid-glass p-8 rounded-[32px] border text-left flex flex-col justify-between min-h-[220px] relative ${parityGenerated ? 'border-teal-400 bg-teal-400/10 shadow-[0_0_50px_rgba(45,212,191,0.4)]' : 'border-white/20'} ${!activeHash ? 'opacity-50' : ''}`}>
                                    <div className="flex justify-between items-start mb-6 w-full relative z-10">
                                        <div className="flex items-center">
                                            <Icon name="disc" size={24} className={parityGenerated ? 'text-teal-400 mr-3 drop-shadow-[0_0_10px_#2dd4bf]' : 'opacity-90 mr-3 text-white'} />
                                            <span className="font-mono text-sm uppercase opacity-90 tracking-wider">XOR Parity Backup</span>
                                            <InfoTooltip text="Generates a redundant binary blob using XOR logic, allowing full file recovery even if shards are missing." />
                                        </div>
                                    </div>
                                    <div className="font-grotesk text-3xl uppercase tracking-wide text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] relative z-10">{parityGenerated ? 'Backup Created' : 'Build Redundancy'}</div>
                                </button>

                                {/* F8: Chrono-Lock */}
                                <div className={`hover-3d-effect liquid-glass p-8 rounded-[32px] border flex flex-col justify-between min-h-[220px] relative ${chronoLocked ? 'border-orange-500 bg-orange-500/10 shadow-[0_0_50px_rgba(249,115,22,0.4)]' : 'border-white/20'} ${!activeHash ? 'opacity-50' : ''}`}>
                                    <div className="flex justify-between items-start mb-4 relative z-10">
                                        <div className="flex items-center">
                                            <Icon name="clock" size={24} className={chronoLocked ? 'text-orange-500 mr-3 drop-shadow-[0_0_10px_#f97316]' : 'opacity-90 mr-3 text-white'} />
                                            <span className="font-mono text-sm uppercase opacity-90 tracking-wider">Time-Release Lock</span>
                                            <InfoTooltip text="Encrypts the file with a key tied to a specific future timestamp. Decryption mathematically fails until timeline is matched." />
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-3 relative z-10">
                                        <input type="time" value={chronoLockTime} onChange={(e)=>setChronoLockTime(e.target.value)} disabled={!activeHash || chronoLocked} className="w-full bg-black/60 border border-white/20 rounded-xl px-5 py-4 font-mono text-xl outline-none focus:border-neon focus:shadow-[0_0_20px_rgba(208,0,255,0.5)] transition-all text-white shadow-inner" style={{colorScheme: 'dark'}} />
                                        <button onClick={applyChronoLock} disabled={!activeHash || !chronoLockTime || chronoLocked} className="mt-1 py-3 bg-white/5 hover:bg-white/10 rounded-xl font-grotesk text-xl uppercase border border-white/10 text-white disabled:opacity-50 transition-all shadow-md">Lock in Timeline</button>
                                    </div>
                                </div>

                                {/* F9: AR Vault Projection */}
                                <div className={`hover-3d-effect liquid-glass p-8 rounded-[32px] border flex flex-col justify-between lg:col-span-2 min-h-[220px] relative ${arActive ? 'border-neon shadow-[0_0_80px_rgba(208,0,255,0.6)]' : 'border-white/20'} ${!activeHash ? 'opacity-50' : ''}`}>
                                    {arActive && (
                                        <div className="absolute inset-0 z-0 opacity-90 overflow-hidden rounded-[32px] pointer-events-none">
                                            <video ref={arVideoRef} autoPlay playsInline muted className="w-full h-full object-cover filter contrast-150 saturate-50 mix-blend-screen" />
                                            <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-neon font-mono text-sm text-center border-2 border-neon p-8 bg-black/70 backdrop-blur-lg shadow-[0_0_50px_#D000FF] rounded-3xl">
                                                <Icon name="scan-line" size={50} className="mx-auto mb-4 animate-pulse" />
                                                [SECURE HUD ENGAGED]<br/><br/>HASH: <span className="text-white drop-shadow-[0_0_5px_#fff]">{activeHash?.hash.substring(0,16)}...</span>
                                            </div>
                                        </div>
                                    )}
                                    <div className="flex justify-between items-start mb-4 relative z-20">
                                        <div className="flex items-center bg-black/50 p-3 rounded-2xl backdrop-blur-md border border-white/10 shadow-lg">
                                            <Icon name="camera" size={24} className={arActive ? 'text-neon mr-3 drop-shadow-[0_0_10px_#D000FF]' : 'opacity-100 mr-3 text-white'} />
                                            <span className="font-mono text-sm uppercase opacity-100 tracking-wider">AR Holographic Projection</span>
                                            <InfoTooltip text="Accesses device camera to overlay a floating augmented reality HUD containing the file's cryptographic signature." />
                                        </div>
                                    </div>
                                    <button onClick={toggleAR} disabled={!activeHash} className="mt-auto relative z-20 py-5 font-grotesk text-2xl uppercase tracking-widest rounded-2xl transition-all duration-300 bg-black/80 border border-white/20 hover:bg-neon hover:text-white hover:border-neon hover:shadow-[0_0_30px_rgba(208,0,255,0.4)] text-white">
                                        {arActive ? 'Deactivate HUD' : 'Initialize Hologram'}
                                    </button>
                                </div>

                            </div>
                            )}

                        </div>
                    </section>
                    
                    {/* DISTRIBUTED LEDGER FEED */}
                    <section id="ledger" className="py-32 bg-transparent relative">
                        <div className="max-w-6xl mx-auto px-6 relative z-10">
                            <div className="flex flex-col md:flex-row items-start md:items-center justify-between mb-12 gap-6 reveal-up">
                                <div>
                                    <h3 className="font-grotesk text-6xl uppercase text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.2)]">Distributed Ledger</h3>
                                    <p className="font-mono text-sm opacity-60 uppercase tracking-[0.3em] mt-4 text-neon">Live cryptographic feed of secured assets.</p>
                                </div>
                                <div className="flex items-center gap-3 font-mono text-xs px-6 py-3 rounded-full border border-neon text-neon bg-neon/10 shadow-[0_0_30px_rgba(208,0,255,0.4)]">
                                    <span className="relative flex h-3 w-3">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-neon opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-3 w-3 bg-neon"></span>
                                    </span>
                                    NETWORK SYNCED
                                </div>
                            </div>

                            <div className="liquid-glass rounded-[40px] border border-white/10 overflow-hidden reveal-up">
                                <div className="max-h-[600px] overflow-y-auto custom-scrollbar p-6 space-y-4">
                                    {registry.length === 0 ? (
                                        <div className="text-center py-20 opacity-50 font-mono text-sm uppercase">Awaiting network propagation...</div>
                                    ) : (
                                        registry.map((record, i) => (
                                            <div key={i} className="bg-black/40 border border-white/5 p-6 rounded-[24px] hover:border-neon/50 hover:bg-black/60 transition-all duration-300 group flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                                <div className="flex items-center gap-6">
                                                    <div className="w-12 h-12 rounded-full bg-dark flex items-center justify-center border border-white/10 group-hover:border-neon group-hover:shadow-[0_0_15px_rgba(208,0,255,0.5)] transition-all">
                                                        <Icon name="box" size={20} className="text-white/50 group-hover:text-neon transition-colors" />
                                                    </div>
                                                    <div>
                                                        <div className="font-grotesk text-2xl uppercase tracking-wide text-white group-hover:text-neon transition-colors drop-shadow-md">{record.name}</div>
                                                        <div className="font-mono text-[10px] text-white/50 mt-1 uppercase flex gap-4">
                                                            <span>Node: {record.author}</span>
                                                            <span>|</span>
                                                            <span>T-Stamp: {new Date(record.created_at).toLocaleString()}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="bg-dark/80 px-4 py-3 rounded-xl border border-white/10 font-mono text-xs text-white/60 truncate max-w-full md:max-w-[300px] group-hover:text-white transition-colors" title={record.hash}>
                                                    {record.hash}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="border-t border-white/5 py-12 bg-dark relative z-10">
                        <div className="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-12">
                            <div className="font-grotesk text-3xl uppercase">DocProof<span className="text-neon">.</span></div>
                            <div className="font-mono text-[10px] tracking-[0.5em] text-center opacity-40">ENCRYPTED. IMMUTABLE. SOVEREIGN. © 2026</div>
                            <div className="flex gap-8">
                                <Icon name="twitter" size={20} className="hover:text-neon cursor-pointer transition-colors" />
                                <Icon name="github" size={20} className="hover:text-neon cursor-pointer transition-colors" />
                                <Icon name="mail" size={20} className="hover:text-neon cursor-pointer transition-colors" />
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
